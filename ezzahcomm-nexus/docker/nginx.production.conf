worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ───────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;
  server_tokens off;

  # ── Gzip ──────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json
             application/javascript application/xml+rss
             application/atom+xml image/svg+xml;

  # ── Client limits ─────────────────────────────────────────
  client_max_body_size 10m;
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 10s;

  # ── Rate limiting zones ───────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=300r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ── Upstream: API ─────────────────────────────────────────
  upstream nexus_api {
    server nexus-api:4000;
    keepalive 32;
  }

  # ── Upstream: Dashboard ───────────────────────────────────
  upstream nexus_dashboard {
    server nexus-dashboard:3001;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name kitabuyetu.ezzahcomm.co.ke api.ezzahcomm.co.ke;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── API server: api.ezzahcomm.co.ke ──────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ezzahcomm.co.ke;

    ssl_certificate /etc/nginx/ssl/api.ezzahcomm.co.ke/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.ezzahcomm.co.ke/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_api:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Security headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # ── Health (no auth needed) ───────────────────────────
    location = /health {
      proxy_pass http://nexus_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      access_log off;
    }

    # ── Webhook routes (raw body, higher rate limit) ──────
    location /api/webhooks/ {
      limit_req zone=webhook_limit burst=50 nodelay;
      limit_conn conn_limit 20;

      proxy_pass http://nexus_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      # Must not buffer for HMAC validation (raw body)
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_read_timeout 30s;
    }

    # ── Auth routes (strict rate limit) ───────────────────
    location ~ ^/api/auth/ {
      limit_req zone=strict_limit burst=5 nodelay;
      limit_conn conn_limit 5;

      proxy_pass http://nexus_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 10;

      proxy_pass http://nexus_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
    }

    # ── Block unknown paths ───────────────────────────────
    location / {
      return 404;
    }
  }

  # ── Dashboard: kitabuyetu.ezzahcomm.co.ke ────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kitabuyetu.ezzahcomm.co.ke;

    ssl_certificate /etc/nginx/ssl/kitabuyetu.ezzahcomm.co.ke/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/kitabuyetu.ezzahcomm.co.ke/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_dash:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Security headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.ezzahcomm.co.ke https://*.supabase.co wss://*.supabase.co;" always;

    # ── Next.js static assets (long cache) ───────────────
    location /_next/static/ {
      proxy_pass http://nexus_dashboard;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      access_log off;
    }

    # ── Next.js image optimization ────────────────────────
    location /_next/image {
      proxy_pass http://nexus_dashboard;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # ── All other Next.js routes ──────────────────────────
    location / {
      limit_req zone=api_limit burst=50 nodelay;

      proxy_pass http://nexus_dashboard;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 60s;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
